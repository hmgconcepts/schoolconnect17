<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Generator • School Connect v2</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 40px 20px; line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    h1 { color: #fff; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #cbd5e1; }
    input { width: 100%; padding: 12px 16px; border: 1px solid #475569; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 15px; }
    button { background: #6366f1; color: white; border: none; padding: 14px 32px; font-size: 16px; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 12px; }
    button:hover { background: #4f46e5; }
    .result { margin-top: 24px; padding: 16px; border-radius: 10px; font-weight: 500; display: none; }
    .success { background: #166534; color: #4ade80; }
    .error { background: #7f1d1d; color: #f87171; }
    .status { font-size: 13px; color: #64748b; margin-top: 16px; }
    .note { font-size: 13px; color: #64748b; margin-top: 24px; padding-top: 16px; border-top: 1px solid #334155; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 School Connect v2 — Generator Test</h1>
    <p class="subtitle">Quick test page to verify the generator works correctly</p>

    <div class="form-group">
      <label>School Name</label>
      <input type="text" id="schoolName" value="Test Academy">
    </div>
    <div class="form-group">
      <label>Short Name</label>
      <input type="text" id="shortName" value="TEST">
    </div>
    <div class="form-group">
      <label>School Motto</label>
      <input type="text" id="motto" value="Excellence in Learning">
    </div>

    <button onclick="testGeneration()">🚀 Test Generate ZIP</button>

    <div id="result" class="result"></div>

    <div class="status">
      <strong>Status:</strong> <span id="status">Ready</span>
    </div>

    <div class="note">
      <strong>Note:</strong> This test uses the embedded generator. If this works, your real builder will also work.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="assets/js/generator.js"></script>

  <script>
    function showResult(msg, type = 'info') {
      const r = document.getElementById('result');
      r.style.display = 'block';
      r.className = `result ${type}`;
      r.innerHTML = msg;
    }

    function updateStatus(text) {
      document.getElementById('status').textContent = text;
    }

    async function testGeneration() {
      updateStatus('Generating...');
      document.getElementById('result').style.display = 'none';

      const config = {
        schoolName: document.getElementById('schoolName').value || 'Test School',
        shortName: document.getElementById('shortName').value || 'TEST',
        schoolMotto: document.getElementById('motto').value || '',
        currency: '₦',
        phone: '',
        email: '',
        address: '',
        modules: ['students','staff','attendance','results','cbt','parents'],
        supabaseUrl: 'https://demo.supabase.co',
        supabaseKey: 'demo-key'
      };

      try {
        if (!window.Generator || typeof window.Generator.build !== 'function') {
          throw new Error('Generator not loaded');
        }

        const success = await window.Generator.build(config);
        
        if (success !== false) {
          updateStatus('Success!');
          showResult('✅ <strong>Generation successful!</strong><br>The ZIP should have downloaded automatically.', 'success');
        } else {
          throw new Error('Generation returned false');
        }
      } catch (err) {
        console.error(err);
        updateStatus('Failed');
        showResult('❌ <strong>Generation failed:</strong> ' + err.message, 'error');
      }
    }

    window.onload = function() {
      const statusEl = document.getElementById('status');
      if (window.Generator) {
        statusEl.innerHTML = 'Generator loaded successfully ✓';
      } else {
        statusEl.innerHTML = 'Generator failed to load ✗';
      }
    };
  </script>
</body>
</html>
